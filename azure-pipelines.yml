trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  dotnetVersion: '8.0.x'

# Referencia al repositorio del backend (mismo proyecto Azure DevOps)
resources:
  repositories:
    - repository: backend
      type: git
      name: BackendContratos/BackendContratos   # Proyecto/Repo
      ref: refs/heads/main

stages:

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Pruebas Unitarias (Karma + Jasmine)
# Valida lógica pura sin HTTP ni DOM: validators y utilidades.
# No necesita backend. Siempre corre al hacer push a main.
# ─────────────────────────────────────────────────────────────
- stage: PruebasUnitarias
  displayName: '1 · Unitarias (Karma + Jasmine)'

  jobs:
  - job: Unitarias
    displayName: 'Karma + Jasmine — validators y utilidades'

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias (npm ci)'

    - script: |
        npx ng test --watch=false --browsers=ChromeHeadless \
          --include='src/app/auth/utils/validators.spec.ts'
      displayName: 'Correr pruebas unitarias'

# ─────────────────────────────────────────────────────────────
# STAGE 2 — Pruebas de Integración (Karma + Jasmine)
# Valida servicios, guards e interceptores sin renderizar DOM.
# Solo corre si el Stage 1 pasó.
# ─────────────────────────────────────────────────────────────
- stage: PruebasIntegracion
  displayName: '2 · Integración (Karma + Jasmine)'
  dependsOn: PruebasUnitarias
  condition: succeeded()

  jobs:
  - job: Integracion
    displayName: 'Karma + Jasmine — servicios, guards e interceptor'

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias (npm ci)'

    - script: |
        npx ng test --watch=false --browsers=ChromeHeadless \
          --include='src/app/core/auth.interceptor.spec.ts' \
          --include='src/app/core/guards/auth.guard.spec.ts' \
          --include='src/app/core/guards/role.guard.spec.ts' \
          --include='src/app/pages/admin/services/contrato.service.spec.ts' \
          --include='src/app/pages/admin/services/poliza.service.spec.ts' \
          --include='src/app/pages/admin/services/proveedores.service.spec.ts' \
          --include='src/app/pages/user/services/liquidacion.service.spec.ts' \
          --include='src/app/pages/user/services/servicio.service.spec.ts' \
          --include='src/app/shared/services/auth-state.service.spec.ts' \
          --include='src/app/auth/services/user.service.spec.ts' \
          --include='src/app/auth/services/auth.service.spec.ts'
      displayName: 'Correr pruebas de integración'

# ─────────────────────────────────────────────────────────────
# STAGE 3 — Pruebas de Componentes (Karma + Jasmine — TestBed)
# Renderiza templates HTML con TestBed y verifica interacciones.
# Solo corre si el Stage 2 pasó. Genera reporte de cobertura.
# ─────────────────────────────────────────────────────────────
- stage: PruebasComponentes
  displayName: '3 · Componentes (Karma + Jasmine — TestBed)'
  dependsOn: PruebasIntegracion
  condition: succeeded()

  jobs:
  - job: Componentes
    displayName: 'Karma + Jasmine — componentes y directivas con TestBed'

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias (npm ci)'

    - script: |
        npx ng test --watch=false --browsers=ChromeHeadless --code-coverage \
          --include='src/app/app.spec.ts' \
          --include='src/app/**/*.component.spec.ts' \
          --include='src/app/core/guards/has-role.directive.spec.ts'
      displayName: 'Correr pruebas de componentes'

    - task: PublishCodeCoverageResults@2
      displayName: 'Publicar cobertura en Azure DevOps'
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/coverage/frontend-contratos/cobertura.xml'
        pathToSources: '$(Build.SourcesDirectory)/src'

# ─────────────────────────────────────────────────────────────
# STAGE 4 — Pruebas E2E (Cypress headless)
# Clona el back, lo arranca en modo Testing (BD en memoria,
# sin SQL Server) y corre Cypress contra los dos servicios.
# Solo corre si el Stage 3 pasó.
# ─────────────────────────────────────────────────────────────
- stage: PruebasE2E
  displayName: '4 · E2E — Cypress headless'
  dependsOn: PruebasComponentes
  condition: succeeded()

  jobs:
  - job: Cypress
    displayName: 'Backend InMemory + Frontend + Cypress'

    steps:

    # ── Clonar ambos repos ───────────────────────────────────
    - checkout: self
      path: front

    - checkout: backend
      path: back
      displayName: 'Clonar repositorio del backend'

    # ── Arrancar el backend (.NET 8, BD en memoria) ──────────
    - task: UseDotNet@2
      displayName: 'Instalar .NET $(dotnetVersion)'
      inputs:
        packageType: sdk
        version: $(dotnetVersion)

    - script: |
        cd $(Pipeline.Workspace)/back/BackendContratos
        echo "=== Restaurando NuGet ==="
        dotnet restore
        echo "=== Publicando backend ==="
        dotnet publish -c Release -o /tmp/backend-out --no-restore
        echo "=== Archivos generados ==="
        ls /tmp/backend-out/*.dll | head -5
        echo "=== Arrancando en :8080 ==="
        ASPNETCORE_ENVIRONMENT=Testing \
        nohup dotnet /tmp/backend-out/BackendContratos.dll \
          --urls "http://localhost:8080" \
          > /tmp/backend.log 2>&1 &
        echo "Backend PID: $!"
      displayName: 'Publicar y arrancar backend (InMemory DB)'
      env:
        ASPNETCORE_ENVIRONMENT: Testing

    # ── Instalar Node y dependencias del front ───────────────
    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias del frontend'
      workingDirectory: $(Pipeline.Workspace)/front

    # ── Dependencias de Chrome en Linux ─────────────────────
    - script: |
        sudo apt-get update -y
        sudo apt-get install -y libgtk2.0-0t64 libgtk-3-0t64 libgbm-dev \
          libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb
      displayName: 'Instalar librerías de Chrome'

    # ── Build y servir el frontend ───────────────────────────
    - script: |
        nohup npx ng serve --port 4200 --host localhost \
          > /tmp/frontend.log 2>&1 &
        echo "ng serve PID: $!"
      displayName: 'Arrancar frontend con ng serve en :4200'
      workingDirectory: $(Pipeline.Workspace)/front

    # ── Esperar y validar ambos servicios ────────────────────
    - script: |
        echo "=== Esperando backend TCP :8080 ==="
        npx wait-on tcp:localhost:8080 --timeout 120000
        echo "=== Seed de usuarios (10s) ==="
        sleep 10
        echo "=== Verificando login ==="
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST http://localhost:8080/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"email":"admin@contratos.com","password":"12345"}')
        echo "HTTP login: $STATUS"
        if [ "$STATUS" != "200" ]; then
          echo "Login falló — mostrando log del backend:"
          cat /tmp/backend.log || true
          exit 1
        fi
        echo "=== Esperando frontend :4200 ==="
        npx wait-on http://localhost:4200 --timeout 60000
        echo "=== Ambos servicios listos ==="
      displayName: 'Validar backend (login 200) + frontend'
      workingDirectory: $(Pipeline.Workspace)/front

    # ── Cypress ──────────────────────────────────────────────
    - script: |
        npx cypress run \
          --headless \
          --browser chrome \
          --reporter junit \
          --reporter-options "mochaFile=cypress/results/results-[hash].xml"
      displayName: 'Correr Cypress E2E'
      workingDirectory: $(Pipeline.Workspace)/front
      env:
        CYPRESS_BASE_URL: 'http://localhost:4200'

    - task: PublishTestResults@2
      displayName: 'Publicar resultados E2E'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Pipeline.Workspace)/front/cypress/results/*.xml'
        mergeTestResults: true
        testRunTitle: 'Cypress E2E'

    - task: PublishBuildArtifacts@1
      displayName: 'Publicar videos y capturas de Cypress'
      condition: always()
      inputs:
        pathToPublish: '$(Pipeline.Workspace)/front/cypress'
        artifactName: 'cypress-report'

# ─────────────────────────────────────────────────────────────
# STAGE 5 — Pruebas de Mutación (Stryker)
# Mide la calidad de los tests matando mutantes del código.
# No necesita backend. Corre en paralelo con los stages 4 y 6.
# break: null → no falla el pipeline, solo reporta el score.
# ─────────────────────────────────────────────────────────────
- stage: PruebasMutacion
  displayName: '5 · Mutación — Stryker'
  dependsOn: PruebasComponentes
  condition: succeeded()

  jobs:
  - job: Stryker
    displayName: 'Stryker Mutator — ChromeHeadless'
    timeoutInMinutes: 60

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias + aplicar patch de Karma'

    - script: npx stryker run --logLevel info
      displayName: 'Ejecutar pruebas de mutación (Stryker)'

    - task: PublishBuildArtifacts@1
      displayName: 'Publicar reporte HTML de mutación'
      condition: always()
      inputs:
        pathToPublish: 'reports/mutation'
        artifactName: 'mutation-report'

# ─────────────────────────────────────────────────────────────
# STAGE 6 — Pruebas de Rendimiento (Lighthouse CI)
# Mide Performance, Accesibilidad, Best Practices y SEO.
# No necesita backend. Corre en paralelo con los stages 4 y 5.
# continueOnError: true → nunca bloquea el pipeline.
# ─────────────────────────────────────────────────────────────
- stage: PruebasRendimiento
  displayName: '6 · Rendimiento — Lighthouse CI'
  dependsOn: PruebasComponentes
  condition: succeeded()

  jobs:
  - job: Lighthouse
    displayName: 'Lighthouse CI — login + registro'
    timeoutInMinutes: 20
    continueOnError: true

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias'

    - script: npx ng build
      displayName: 'Build de producción (ng build)'

    - script: npx lhci autorun
      displayName: 'Ejecutar Lighthouse CI'
      env:
        CHROME_FLAGS: '--no-sandbox --headless --disable-gpu --disable-dev-shm-usage'

    - task: PublishBuildArtifacts@1
      displayName: 'Publicar reportes de rendimiento'
      condition: always()
      inputs:
        pathToPublish: 'reports/lighthouse'
        artifactName: 'lighthouse-report'
