trigger:
  branches:
    include:
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  dotnetVersion: '8.0.x'

# Referencia al repositorio del backend (mismo proyecto Azure DevOps)
resources:
  repositories:
    - repository: backend
      type: git
      name: BackendContratos/BackendContratos   # Proyecto/Repo
      ref: refs/heads/main

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Pruebas Unitarias e Integración (Karma + Jasmine)
# No necesita backend. Siempre corre al hacer push a main.
# ─────────────────────────────────────────────────────────────
stages:

- stage: PruebasUnitariasIntegracion
  displayName: '1 · Unitarias + Integración (107 specs)'

  jobs:
  - job: Karma
    displayName: 'Karma + Jasmine — ChromeHeadless'

    steps:

    - checkout: self

    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias (npm ci)'

    - script: |
        npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
      displayName: 'Correr pruebas unitarias e integración'

    - script: |
        echo "=== Archivos de cobertura generados ==="
        ls coverage/frontend-contratos/ || echo "WARN: no existe coverage/frontend-contratos/"
        echo "=== Convirtiendo LCOV a Cobertura XML ==="
        pip3 install lcov_cobertura --quiet
        python3 -m lcov_cobertura \
          coverage/frontend-contratos/lcov.info \
          --output coverage/cobertura.xml
        echo "=== Primeras líneas del XML ==="
        head -10 coverage/cobertura.xml
      displayName: 'Convertir LCOV → Cobertura XML (Python)'
      condition: succeededOrFailed()

    - task: PublishCodeCoverageResults@2
      displayName: 'Publicar cobertura en Azure DevOps'
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: '$(Build.SourcesDirectory)/coverage/cobertura.xml'
        pathToSources: '$(Build.SourcesDirectory)/src'

# ─────────────────────────────────────────────────────────────
# STAGE 2 — Pruebas E2E (Cypress headless)
# Clona el back, lo arranca en modo Testing (BD en memoria,
# sin SQL Server) y corre Cypress contra los dos servicios.
# Solo corre si el Stage 1 pasó.
# ─────────────────────────────────────────────────────────────
- stage: PruebasE2E
  displayName: '2 · E2E — Cypress headless'
  dependsOn: PruebasUnitariasIntegracion
  condition: succeeded()

  jobs:
  - job: Cypress
    displayName: 'Backend InMemory + Frontend + Cypress'

    steps:

    # ── Clonar ambos repos ───────────────────────────────────
    - checkout: self
      path: front

    - checkout: backend
      path: back
      displayName: 'Clonar repositorio del backend'

    # ── Arrancar el backend (.NET 8, BD en memoria) ──────────
    - task: UseDotNet@2
      displayName: 'Instalar .NET $(dotnetVersion)'
      inputs:
        packageType: sdk
        version: $(dotnetVersion)

    - script: |
        cd $(Pipeline.Workspace)/back/BackendContratos
        echo "=== Restaurando NuGet ==="
        dotnet restore
        echo "=== Publicando backend ==="
        dotnet publish -c Release -o /tmp/backend-out --no-restore
        echo "=== Archivos generados ==="
        ls /tmp/backend-out/*.dll | head -5
        echo "=== Arrancando en :8080 ==="
        ASPNETCORE_ENVIRONMENT=Testing \
        nohup dotnet /tmp/backend-out/BackendContratos.dll \
          --urls "http://localhost:8080" \
          > /tmp/backend.log 2>&1 &
        echo "Backend PID: $!"
      displayName: 'Publicar y arrancar backend (InMemory DB)'
      env:
        ASPNETCORE_ENVIRONMENT: Testing

    # ── Instalar Node y dependencias del front ───────────────
    - task: NodeTool@0
      displayName: 'Instalar Node.js $(nodeVersion)'
      inputs:
        versionSpec: $(nodeVersion)

    - script: npm ci
      displayName: 'Instalar dependencias del frontend'
      workingDirectory: $(Pipeline.Workspace)/front

    # ── Dependencias de Chrome en Linux ─────────────────────
    - script: |
        sudo apt-get update -y
        sudo apt-get install -y libgtk2.0-0t64 libgtk-3-0t64 libgbm-dev \
          libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb
      displayName: 'Instalar librerías de Chrome'

    # ── Build y servir el frontend ───────────────────────────
    - script: |
        nohup npx ng serve --port 4200 --host localhost \
          > /tmp/frontend.log 2>&1 &
        echo "ng serve PID: $!"
      displayName: 'Arrancar frontend con ng serve en :4200'
      workingDirectory: $(Pipeline.Workspace)/front

    # ── Esperar y validar ambos servicios ────────────────────
    - script: |
        echo "=== Esperando backend TCP :8080 ==="
        npx wait-on tcp:localhost:8080 --timeout 120000
        echo "=== Seed de usuarios (10s) ==="
        sleep 10
        echo "=== Verificando login ==="
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST http://localhost:8080/api/auth/login \
          -H "Content-Type: application/json" \
          -d '{"email":"admin@contratos.com","password":"12345"}')
        echo "HTTP login: $STATUS"
        if [ "$STATUS" != "200" ]; then
          echo "Login falló — mostrando log del backend:"
          cat /tmp/backend.log || true
          exit 1
        fi
        echo "=== Esperando frontend :4200 ==="
        npx wait-on http://localhost:4200 --timeout 60000
        echo "=== Ambos servicios listos ==="
      displayName: 'Validar backend (login 200) + frontend'
      workingDirectory: $(Pipeline.Workspace)/front

    # ── Cypress ──────────────────────────────────────────────
    - script: |
        npx cypress run \
          --headless \
          --browser chrome \
          --reporter junit \
          --reporter-options "mochaFile=cypress/results/results-[hash].xml"
      displayName: 'Correr Cypress E2E'
      workingDirectory: $(Pipeline.Workspace)/front
      env:
        CYPRESS_BASE_URL: 'http://localhost:4200'

    - task: PublishTestResults@2
      displayName: 'Publicar resultados E2E'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(Pipeline.Workspace)/front/cypress/results/*.xml'
        mergeTestResults: true
        testRunTitle: 'Cypress E2E'
